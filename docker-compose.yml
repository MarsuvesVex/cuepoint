services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: apps/api
        APP_CMD: ./cmd/api
    environment:
      API_ADDR: :${API_CONTAINER_PORT:-8080}
      API_BASE_URL: http://api:${API_CONTAINER_PORT:-8080}
      DATABASE_URL: postgres://cuepoint:cuepoint@postgres:5432/cuepoint?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: ${REDIS_DB:-0}
      QUEUE_NAME: ${QUEUE_NAME:-cuepoint:jobs}
    ports:
      - "${API_PORT:-8088}:${API_CONTAINER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=${TRAEFIK_ENABLED:-true}"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.cuepoint-api.rule=Host(`${API_HOST:-api-cuepoint.dev.local}`)"
      - "traefik.http.routers.cuepoint-api.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.routers.cuepoint-api.tls=${TRAEFIK_TLS:-false}"
      - "traefik.http.services.cuepoint-api.loadbalancer.server.port=${API_CONTAINER_PORT:-8080}"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: apps/worker
        APP_CMD: ./cmd/worker
    environment:
      DATABASE_URL: postgres://cuepoint:cuepoint@postgres:5432/cuepoint?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: ${REDIS_DB:-0}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5s}
      WORKER_BLOCK_TIMEOUT: ${WORKER_BLOCK_TIMEOUT:-5s}
      QUEUE_NAME: ${QUEUE_NAME:-cuepoint:jobs}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - default

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cuepoint
      POSTGRES_USER: cuepoint
      POSTGRES_PASSWORD: cuepoint
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuepoint -d cuepoint"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - traefik

  pgadmin:
    image: dpage/pgadmin4:9
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@cuepoint.app}
      PGADMIN_DEFAULT_PASSWORD: cuepoint
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=${TRAEFIK_ENABLED:-true}"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.cuepoint-pgadmin.rule=Host(`${PGADMIN_HOST:-pgadmin-cuepoint.dev.local}`)"
      - "traefik.http.routers.cuepoint-pgadmin.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.routers.cuepoint-pgadmin.tls=${TRAEFIK_TLS:-false}"
      - "traefik.http.services.cuepoint-pgadmin.loadbalancer.server.port=80"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - traefik

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "${REDISINSIGHT_PORT:-5540}:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      - redis
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=${TRAEFIK_ENABLED:-true}"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      - "traefik.http.routers.cuepoint-redisinsight.rule=Host(`${REDISINSIGHT_HOST:-redisinsight-cuepoint.dev.local}`)"
      - "traefik.http.routers.cuepoint-redisinsight.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.routers.cuepoint-redisinsight.tls=${TRAEFIK_TLS:-false}"
      - "traefik.http.services.cuepoint-redisinsight.loadbalancer.server.port=5540"

volumes:
  postgres-data:
  pgadmin-data:
  redis-data:
  redisinsight-data:

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
